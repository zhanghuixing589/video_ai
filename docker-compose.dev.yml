version: '3.9'

# 开发环境配置 - 包含管理工具
services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: video-ai-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: zhx1314
      POSTGRES_DB: video_db
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - video-network-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: video-ai-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - video-network-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: video-ai-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - video-network-dev
      - video-network
    restart: unless-stopped

  # Redis Commander - Redis 管理工具
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: video-ai-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "8082:8081"
    depends_on:
      - redis
    networks:
      - video-network-dev
    restart: unless-stopped

networks:
  video-network-dev:
    driver: bridge
  video-network:
    external: true
    name: video_ai_video-network

volumes:
  postgres_data_dev:
  redis_data_dev:
