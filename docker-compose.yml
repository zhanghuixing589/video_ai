version: '3.9'

services:
  # PostgreSQL 数据库服务
  postgres:
    image: postgres:15-alpine
    container_name: video-ai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: zhx1314
      POSTGRES_DB: video_db
      TZ: Asia/Shanghai
      command: postgres -c shared_buffers=256MB -c max_connections=200
    ports:
      - "5432:5432"
    volumes:
      # 数据持久化
      - postgres_data:/var/lib/postgresql/data
      # 初始化脚本
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - video-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: video-ai-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      # 数据持久化
      - redis_data:/data
    networks:
      - video-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Java 后端应用
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE: target/video_ai-0.0.1.jar
    container_name: video-ai-backend
    environment:
      # Spring 配置
      SPRING_PROFILES_ACTIVE: prod
      SPRING_APPLICATION_NAME: video-ai-backend

      # 数据库配置
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: video_db
      DB_USER: postgres
      DB_PASSWORD: zhx1314

      # Redis 配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""

      # 服务器配置
      SERVER_PORT: 8080

      # JWT 配置（生产环境必须修改！）
      JWT_SECRET: change-this-to-your-256bit-secret-key-in-production
      JWT_EXPIRATION: 86400000

      # AI 服务配置
      AI_SERVICE_URL: http://ai-service:8000

      # JVM 配置
      JAVA_OPTS: "-Xms512m -Xmx1024m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Dfile.encoding=UTF-8 -Duser.timezone=Asia/Shanghai"

    ports:
      - "8080:8080"

    volumes:
      # 日志持久化
      - ./logs:/app/logs

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - video-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: video-ai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    # 明确添加健康检查依赖
    depends_on:
      postgres:
        condition: service_healthy
    # 确保网络一致
    networks:
      - video-network-dev
    profiles:
      - nginx
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

# 网络定义
networks:
  video-network:
    driver: bridge

# 数据卷定义
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
